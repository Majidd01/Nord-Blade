<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 780" fill="none" role="img" aria-label="Nordblade knife">
  <defs>
    <linearGradient id="bladeSteel" x1="40" y1="40" x2="380" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EDEDED"/>
      <stop offset="25%" stop-color="#9A9A9A"/>
      <stop offset="50%" stop-color="#D8D8D8"/>
      <stop offset="75%" stop-color="#7A7A7A"/>
      <stop offset="100%" stop-color="#C5C5C5"/>
    </linearGradient>
    <linearGradient id="handleWood" x1="150" y1="20" x2="280" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A2618"/>
      <stop offset="50%" stop-color="#1E140E"/>
      <stop offset="100%" stop-color="#4A3220"/>
    </linearGradient>
    <linearGradient id="bolster" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D09A"/>
      <stop offset="100%" stop-color="#8B6A2E"/>
    </linearGradient>
    <linearGradient id="edgeShine" x1="200" y1="260" x2="250" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="12" dy="28" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)" transform="rotate(-18 210 390)">
    <!-- Handle -->
    <path
      fill="url(#handleWood)"
      d="M168 48c-10 0-18 8-18 18v168c0 14 8 26 20 31l42 16 40-18c10-5 16-15 16-26V66c0-10-8-18-18-18H168z"
    />
    <ellipse cx="190" cy="110" rx="7" ry="7" fill="#C5A059" opacity="0.85"/>
    <ellipse cx="190" cy="170" rx="7" ry="7" fill="#C5A059" opacity="0.85"/>
    <ellipse cx="190" cy="220" rx="7" ry="7" fill="#C5A059" opacity="0.85"/>
    <!-- Bolster -->
    <path fill="url(#bolster)" d="M152 248h116l-10 34H162l-10-34z"/>
    <!-- Blade -->
    <path
      fill="url(#bladeSteel)"
      d="M162 278h96c8 0 14 6 14 14 0 120-18 280-48 420-4 18-18 32-36 36-10 2-20-2-26-10C128 688 112 560 112 420c0-70 8-110 20-128 6-8 16-14 26-14h4z"
    />
    <!-- Damascus waves -->
    <path stroke="#B8B8B8" stroke-width="2" opacity="0.55" fill="none" d="M180 300c20 40 8 90-6 140s-10 110 8 170"/>
    <path stroke="#8F8F8F" stroke-width="1.5" opacity="0.45" fill="none" d="M198 310c18 36 4 86-8 132s-8 102 10 160"/>
    <path stroke="#CFCFCF" stroke-width="1.2" opacity="0.4" fill="none" d="M216 318c14 34 2 80-10 124s-6 96 8 148"/>
    <!-- Edge highlight -->
    <path fill="url(#edgeShine)" d="M214 290l28 8c4 70-4 220-22 360l-18-6c16-130 20-280 12-362z"/>
    <!-- Tip shadow -->
    <path fill="#050505" opacity="0.18" d="M172 680c20 20 40 28 56 30-22-60-36-140-42-220-8 50-14 120-14 190z"/>
  </g>
</svg>
